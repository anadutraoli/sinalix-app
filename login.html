<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinalix | Login</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="bg-login">
    <div class="login-container">
      <main class="login-main">
        <h1>Olá!</h1>
        <p>Seja Bem-Vindo ao Sinalix</p>
        <div class="login-form-container">
          <h2>Login</h2>
            <form action="./apresentacao.html">
              <input type="email" name="email" id="userEmail" placeholder="Email">
              <input type="password" name="senha" id="userSenha" placeholder="Senha">
              <button>Entrar</button>
              <p><ins>Esqueci minha senha</ins></p>
            </form> 
            <div class="">
              <p>Continue com</p>
              <div class="redes-sociais">
                <img src="./assets/tela-login/logo-facebook.png" alt="Logo do Facebook">
                <img src="./assets/tela-login/logo-google.png" alt="Logo do Google">
                <img src="./assets/tela-login/logo-apple.png " alt="Logo da Apple">
              </div>
            </div>
            <p>Ainda não tem conta? <strong><a href="./cadastro.html">Clique aqui</a></strong></p>
        </div>
      </main>
    </div>
  </body>
</html>
